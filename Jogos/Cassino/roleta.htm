<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Slot Master Final</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

canvas{
    margin-top:20px;
    background:#111;
    border-radius:12px;
}

button{
    padding:10px 20px;
    margin-top:10px;
    background:gold;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

#overlay{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.85);
    color:gold;
    z-index:10;
}

@keyframes pop{
    0%{transform:scale(0.5);opacity:0;}
    100%{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<h1>🎰 Slot Master</h1>
<div id="balance">Saldo: 1000</div>

<canvas id="c" width="300" height="300"></canvas>

<br>
<input id="bet" type="number" value="10">
<button onclick="spin()">Girar</button>

<div id="overlay"></div>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

const symbols=["🍒","🍋","🔔","⭐","💎"];
const mult={"⭐":2,"🔔":5,"💎":10};

let reels=[[],[],[]];
let offsets=[0,0,0];
let speeds=[0,0,0];
let stopping=[false,false,false];

let spinning=false;
let balance=1000;

let particles=[];
let currentHighlights=[];
let currentLines=[];

const cell=100;

// sons
const spinSound=new Audio("https://actions.google.com/sounds/v1/casino/slot_machine.ogg");
const winSound=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const bgMusic=new Audio("https://actions.google.com/sounds/v1/ambiences/casino_background.ogg");
bgMusic.loop=true;

// init reels
for(let i=0;i<3;i++){
    for(let j=0;j<30;j++){
        reels[i].push(symbols[Math.floor(Math.random()*symbols.length)]);
    }
}

// draw
function draw(){
    ctx.clearRect(0,0,300,300);

    for(let c=0;c<3;c++){
        for(let r=0;r<4;r++){
            let base=Math.round(offsets[c]/cell);
            let index=(base+r)%reels[c].length;
            if(index<0) index+=reels[c].length;

            let y=r*cell-(offsets[c]%cell);

            let highlight=currentHighlights.some(h=>h[0]==r && h[1]==c);

            ctx.fillStyle=highlight?"gold":"#222";
            ctx.fillRect(c*cell,y,cell,cell);

            ctx.fillStyle="#fff";
            ctx.font="40px Arial";
            ctx.textAlign="center";
            ctx.fillText(reels[c][index],c*cell+50,y+60);
        }
    }

    // grid
    ctx.strokeStyle="#fff";
    for(let i=1;i<3;i++){
        ctx.beginPath();
        ctx.moveTo(0,i*100);
        ctx.lineTo(300,i*100);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(i*100,0);
        ctx.lineTo(i*100,300);
        ctx.stroke();
    }

    // desenhar linhas vencedoras
    currentLines.forEach(drawLine);

    drawParticles();
}

// linha vermelha
function drawLine(line){
    ctx.strokeStyle="red";
    ctx.lineWidth=6;

    let a=line[0];
    let c=line[2];

    ctx.beginPath();
    ctx.moveTo(a[1]*100+50,a[0]*100+50);
    ctx.lineTo(c[1]*100+50,c[0]*100+50);
    ctx.stroke();
}

// partículas
function explode(){
    particles=[];
    for(let i=0;i<25;i++){
        particles.push({
            x:150,y:150,
            vx:(Math.random()-0.5)*8,
            vy:(Math.random()-0.5)*8,
            life:20
        });
    }
}

function drawParticles(){
    particles=particles.filter(p=>p.life>0);

    particles.forEach(p=>{
        ctx.fillStyle="gold";
        ctx.beginPath();
        ctx.arc(p.x,p.y,3,0,Math.PI*2);
        ctx.fill();

        p.x+=p.vx;
        p.y+=p.vy;
        p.life--;
    });
}

// animação
function animate(){
    for(let i=0;i<3;i++){
        if(speeds[i]>0){
            offsets[i]+=speeds[i];

            if(stopping[i]){
                speeds[i]*=0.92;

                if(speeds[i]<1){
                    speeds[i]=0;
                    offsets[i]=Math.round(offsets[i]/cell)*cell;
                }
            }
        }
    }

    draw();

    if(spinning){
        requestAnimationFrame(animate);
    }else{
        checkWin();
    }
}

// spin
function spin(){
    if(spinning) return;

    let bet=parseInt(document.getElementById("bet").value);
    if(bet>balance) return alert("Sem saldo");

    balance-=bet;
    update();

    bgMusic.play().catch(()=>{});
    spinSound.play();

    currentHighlights=[];
    currentLines=[];

    spinning=true;

    speeds=[30,30,30];
    stopping=[false,false,false];

    setTimeout(()=>stopping[0]=true,1000);
    setTimeout(()=>stopping[1]=true,1800);
    setTimeout(()=>stopping[2]=true,2600);

    setTimeout(()=>spinning=false,4000);

    animate();
}

// grid correto
function getGrid(){
    let g=[];
    for(let r=0;r<3;r++){
        let row=[];
        for(let c=0;c<3;c++){
            let base=Math.round(offsets[c]/cell);
            let index=(base+r)%reels[c].length;
            if(index<0) index+=reels[c].length;
            row.push(reels[c][index]);
        }
        g.push(row);
    }
    return g;
}

// paylines
const lines=[
[[0,0],[0,1],[0,2]],
[[1,0],[1,1],[1,2]],
[[2,0],[2,1],[2,2]],
[[0,0],[1,1],[2,2]],
[[0,2],[1,1],[2,0]],
[[0,0],[1,0],[2,0]],
[[0,1],[1,1],[2,1]],
[[0,2],[1,2],[2,2]]
];

// check
function checkWin(){
    let g=getGrid();
    let total=0;
    let wins=[];

    for(let line of lines){
        let [a,b,c]=line;

        let s1=g[a[0]][a[1]];
        let s2=g[b[0]][b[1]];
        let s3=g[c[0]][c[1]];

        if(s1===s2 && s2===s3){
            let m=mult[s1]||1;
            total+=100*m;
            wins.push(line);
        }
    }

    if(total>0){
        explode();
        animateWin(wins,total);
    }else{
        update();
    }
}

// animação vitória progressiva
function animateWin(lines,total){
    let step=0;

    function anim(){
        currentHighlights=[];

        lines.forEach(line=>{
            for(let i=0;i<step;i++){
                currentHighlights.push(line[i]);
            }
        });

        currentLines=lines;

        draw();

        step++;

        if(step<=3){
            setTimeout(anim,200);
        }else{
            showWin(total);
        }
    }

    anim();
}

// overlay
function showWin(total){
    winSound.play();
    balance+=total;
    update();

    let o=document.getElementById("overlay");

    o.style.display="flex";
    o.style.fontSize="60px";

    o.innerHTML=`
        <div style="
            animation:pop 0.3s ease;
            text-shadow:0 0 20px gold,0 0 40px orange;
        ">
            💰 +${total}
        </div>
    `;

    setTimeout(()=>o.style.display="none",1200);
}

// update
function update(){
    document.getElementById("balance").innerHTML="Saldo: "+balance;
}

draw();
</script>

</body>
</html>
