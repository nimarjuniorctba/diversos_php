<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Movimentações Financeiras</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
}

.menu {
    background: #333;
    padding: 15px;
}
.menu a {
    color: #fff;
    margin-right: 15px;
    text-decoration: none;
    font-weight: bold;
}

.container {
    padding: 20px;
    max-width: 1100px;
    margin: auto;
}

.filtro {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.filtro div {
    flex: 1;
    min-width: 150px;
}

input, select, button {
    padding: 10px;
    width: 100%;
    box-sizing: border-box;
    margin-top: 5px;
}

button {
    background: #007bff;
    color: #fff;
    border: none;
    cursor: pointer;
}

.btn-mini {
    width: auto;
    padding: 6px 10px;
    font-size: 12px;
    background: #6c757d;
}

.bloco-resultado {
    margin-top: 30px;
}

.topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.resumo {
    font-weight: bold;
}

.entrada-total { color: green; }
.saida-total { color: red; }

.grid {
    display: flex;
    gap: 20px;
    margin-top: 15px;
}

.tabela-box {
    flex: 2;
}

.grafico-box {
    flex: 1;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border: 1px solid #ccc;
    text-align: center;
}

th {
    background: #333;
    color: #fff;
}

.entrada { color: green; }
.saida { color: red; }

.acoes button {
    width: auto;
    padding: 4px 6px;
    font-size: 12px;
    margin: 2px;
}
</style>

</head>
<body>

<div class="menu">
    <a href="#">🏠 Home</a>
    <a href="#">📊 Movimentações</a>
</div>

<div class="container">

    <h3>Filtros</h3>

    <div class="filtro">
        <div>
            <label>Data Inicial</label>
            <input type="date" id="dataInicio">
        </div>

        <div>
            <label>Data Final</label>
            <input type="date" id="dataFim">
        </div>

        <div>
            <label>Tipo</label>
            <select id="tipoFiltro">
                <option value="todos">Todos</option>
                <option value="entrada">Entrada</option>
                <option value="saida">Saída</option>
            </select>
        </div>

        <div>
            <label>Origem</label>
            <select id="origemFiltro">
                <option value="todos">Todos</option>
                <option value="agenda">Agenda</option>
                <option value="manual">Manual</option>
            </select>
        </div>
    </div>

    <br>
    <button id="btnFiltrar">Filtrar</button>

    <div class="bloco-resultado">

        <h3>📊 Movimentações Financeiras</h3>

        <div class="topo">

            <div class="resumo">
                <span class="entrada-total">Entradas: R$ <span id="totalEntrada">0</span></span> |
                <span class="saida-total">Saídas: R$ <span id="totalSaida">0</span></span>
                
                <!-- FILTRO RÁPIDO -->
                <select id="filtroRapido" style="width:auto; margin-left:10px;">
                    <option value="todos">Todos</option>
                    <option value="entrada">Entradas</option>
                    <option value="saida">Saídas</option>
                </select>
            </div>

            <div>
                <button id="btnRelatorio" class="btn-mini">📄 Gerar Relatório (PDF)</button>
            </div>

        </div>

        <div class="grid">

            <div class="tabela-box">

                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Tipo</th>
                            <th>Origem</th>
                            <th>Descrição</th>
                            <th>Valor</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela"></tbody>
                </table>

            </div>

            <div class="grafico-box">
                <canvas id="grafico"></canvas>
            </div>

        </div>

    </div>

</div>

<script>

// MAIS DADOS
let dados = [
    {data:"2026-04-01", tipo:"entrada", origem:"agenda", desc:"Lavagem Simples", valor:30},
    {data:"2026-04-02", tipo:"entrada", origem:"agenda", desc:"Lavagem + Cera", valor:70},
    {data:"2026-04-03", tipo:"saida", origem:"manual", desc:"Compra produto", valor:25},
    {data:"2026-04-05", tipo:"entrada", origem:"agenda", desc:"Higienização", valor:120},
    {data:"2026-04-07", tipo:"saida", origem:"manual", desc:"Manutenção", valor:60},
    {data:"2026-04-10", tipo:"entrada", origem:"agenda", desc:"Lavagem", valor:50},
    {data:"2026-04-11", tipo:"saida", origem:"manual", desc:"Produto", valor:20},
    {data:"2026-04-12", tipo:"entrada", origem:"agenda", desc:"Cera", valor:80}
];

let chart;
let listaAtual = dados;

// RENDER
function render(lista){

    listaAtual = lista;

    let filtroRapido = $('#filtroRapido').val();

    let html = "";
    let totalEntrada = 0;
    let totalSaida = 0;

    lista.forEach((item, index) => {

        if(item.tipo === 'entrada') totalEntrada += item.valor;
        else totalSaida += item.valor;

        if(filtroRapido !== 'todos' && item.tipo !== filtroRapido) return;

        html += `
        <tr>
            <td>${item.data}</td>
            <td class="${item.tipo}">${item.tipo}</td>
            <td>${item.origem}</td>
            <td>${item.desc}</td>
            <td>R$ ${item.valor}</td>
            <td class="acoes">
                <button onclick="editar(${index})">✏️</button>
                <button onclick="excluir(${index})">❌</button>
            </td>
        </tr>
        `;
    });

    $('#tabela').html(html);
    $('#totalEntrada').text(totalEntrada.toFixed(2));
    $('#totalSaida').text(totalSaida.toFixed(2));

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById('grafico'), {
        type: 'doughnut',
        data: {
            labels: ['Entradas', 'Saídas'],
            datasets: [{
                data: [totalEntrada, totalSaida]
            }]
        }
    });
}

// EDITAR
function editar(index){
    alert('Aqui você vai abrir edição futuramente');
}

// EXCLUIR
function excluir(index){
    if(confirm('Excluir lançamento?')){
        listaAtual.splice(index,1);
        render(listaAtual);
    }
}

// FILTROS
$('#btnFiltrar').click(function(){

    let ini = $('#dataInicio').val();
    let fim = $('#dataFim').val();
    let tipo = $('#tipoFiltro').val();
    let origem = $('#origemFiltro').val();

    let filtrado = dados.filter(d => {
        return (!ini || d.data >= ini) &&
               (!fim || d.data <= fim) &&
               (tipo === 'todos' || d.tipo === tipo) &&
               (origem === 'todos' || d.origem === origem);
    });

    render(filtrado);
});

$('#filtroRapido').change(function(){
    render(listaAtual);
});

// RELATÓRIO
$('#btnRelatorio').click(function(){
    alert('Gerar relatório PDF com base nos filtros');
});

// INIT
render(dados);

</script>

</body>
</html>
